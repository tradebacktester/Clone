openapi: "3.1.0"
info:
  title: Api
  version: "1.0.0"
  description: Smart Money Trading Bot API

servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Bot Control ──────────────────────────────────────────────────────────────
  /bot/status:
    get:
      operationId: getBotStatus
      summary: Get bot status and current state
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      summary: Start the trading bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotStartInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      summary: Stop the trading bot
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/emergency-stop:
    post:
      operationId: emergencyStop
      summary: Emergency stop — immediately halt bot and close all open positions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyStopResponse"

  /bot/resume:
    post:
      operationId: resumeBot
      summary: Clear emergency stop or risk halt and resume
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/config:
    get:
      operationId: getBotConfig
      summary: Get bot configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"
    put:
      operationId: updateBotConfig
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  # ── Trades ────────────────────────────────────────────────────────────────────
  /trades:
    get:
      operationId: listTrades
      summary: List all trades
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, all]
        - name: pair
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeList"

  /trades/{id}:
    get:
      operationId: getTrade
      summary: Get a single trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found

  /trades/{id}/close:
    post:
      operationId: closeTrade
      summary: Manually close an open trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found

  # ── Paper Trading ─────────────────────────────────────────────────────────
  /paper/positions:
    get:
      operationId: getPaperPositions
      summary: Get open paper trading positions with live unrealized P&L
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperPositions"

  /paper/performance:
    get:
      operationId: getPaperPerformance
      summary: Get paper trading performance stats and account balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperPerformance"

  # ── Analytics & Performance ────────────────────────────────────────────────
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      summary: Get overall performance summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/equity-curve:
    get:
      operationId: getEquityCurve
      summary: Get equity curve data points
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1d, 7d, 30d, 90d, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /analytics/win-rate-breakdown:
    get:
      operationId: getWinRateBreakdown
      summary: Win rate broken down by pair, session, and setup quality
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WinRateBreakdown"

  /analytics/monthly-pnl:
    get:
      operationId: getMonthlyPnl
      summary: Monthly PnL grouped by month
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyPnl"

  /analytics/monte-carlo:
    post:
      operationId: runMonteCarlo
      summary: Run Monte Carlo simulation on trading strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloResult"

  /analytics/trade-comparison:
    get:
      operationId: getTradeComparison
      summary: Compare winners vs losers across all strategy dimensions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeComparisonResponse"

  /analytics/rule-adherence:
    get:
      operationId: getRuleAdherence
      summary: Measure AMD/SMC rule adherence and its impact on win rate
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleAdherenceResponse"

  # ── Trade Memory & Self-Improvement Engine ────────────────────────────────
  /analytics/memory/summary:
    get:
      operationId: getMemorySummary
      summary: High-level trade memory statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySummary"

  /analytics/memory/trades:
    get:
      operationId: getMemoryTrades
      summary: Recent trade memory records with component scores
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeMemoryRecord"

  /analytics/memory/missed:
    get:
      operationId: getMissedOpportunities
      summary: Signals that were rejected with aftermath tracking
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MissedOpportunity"

  /analytics/memory/confidence-profiles:
    get:
      operationId: getConfidenceProfiles
      summary: Cluster-level confidence profiles with dynamic adjustments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfidenceProfile"

  /analytics/memory/top-setups:
    get:
      operationId: getTopSetups
      summary: Best and worst performing setup clusters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopSetups"

  /analytics/drawdown:
    get:
      operationId: getDrawdown
      summary: Drawdown series over time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DrawdownPoint"

  # ── Market Analysis ────────────────────────────────────────────────────────
  /market/zones:
    get:
      operationId: getMarketZones
      summary: Get detected supply and demand zones
      parameters:
        - name: pair
          in: query
          schema:
            type: string
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [15m, 1h, 4h, 1d]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketZone"

  /market/regime:
    get:
      operationId: getMarketRegime
      summary: Current market regime per pair
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketRegime"

  /regime/analytics:
    get:
      operationId: getRegimeAnalytics
      summary: Get regime performance analytics and adaptive weights
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeAnalyticsResponse"

  /regime/weights:
    get:
      operationId: getRegimeWeights
      summary: Get adaptive weights per regime
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegimeWeightEntry"

  /market/signals:
    get:
      operationId: getActiveSignals
      summary: Get currently active trade signals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSignal"

  # ── Learning Engine ────────────────────────────────────────────────────────
  /learning/stats:
    get:
      operationId: getLearningStats
      summary: Get RL agent learning statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningStats"

  /learning/setup-scores:
    get:
      operationId: getSetupScores
      summary: Get setup quality scores by pattern
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetupScore"

  /learning/reset:
    post:
      operationId: resetLearning
      summary: Reset the RL agent weights
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningStats"

  # ── Backtesting ────────────────────────────────────────────────────────────
  /backtest/run:
    post:
      operationId: runBacktest
      summary: Run a backtest with given parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtest/batch:
    post:
      operationId: runBatchBacktest
      summary: Run backtests for all three pairs (EURUSD, GBPUSD, USDJPY) over 5 years
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchBacktestInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchBacktestResult"

  /backtest/walkforward:
    post:
      operationId: runWalkForward
      summary: Walk-forward analysis across all three pairs with parameter optimization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkForwardInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkForwardResult"

  /backtest/history:
    get:
      operationId: listBacktests
      summary: List past backtest runs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacktestSummary"

  /backtest/{id}:
    get:
      operationId: getBacktest
      summary: Get a single backtest result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"
        "404":
          description: Not found

  # ── Broker ────────────────────────────────────────────────────────────────
  /broker/accounts:
    get:
      operationId: listBrokerAccounts
      summary: List configured broker accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerAccount"
    post:
      operationId: addBrokerAccount
      summary: Add a broker account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerAccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerAccount"

  /broker/accounts/{id}:
    delete:
      operationId: deleteBrokerAccount
      summary: Remove a broker account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /broker/live-mode:
    put:
      operationId: setLiveMode
      summary: Enable or disable live trading mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveModeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveModeResponse"

  /broker/execution-log:
    get:
      operationId: getExecutionLog
      summary: Get broker execution event log with slippage tracking
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: eventType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionLogResponse"

  # ── Supervisor ──────────────────────────────────────────────────────────────
  /supervisor/status:
    get:
      operationId: getSupervisorStatus
      summary: Get current supervisor health snapshot and all check results
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorStatus"

  /supervisor/alerts:
    get:
      operationId: getSupervisorAlerts
      summary: Get supervisor alerts list
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: unacknowledgedOnly
          in: query
          schema:
            type: boolean
        - name: severity
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupervisorAlert"

  /supervisor/alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      summary: Acknowledge a supervisor alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorAlert"
        "404":
          description: Not found

  /supervisor/checks/run:
    post:
      operationId: runSupervisorChecks
      summary: Force run all supervisor health checks immediately
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorStatus"

  # ── News Calendar ──────────────────────────────────────────────────────────
  /news/events:
    get:
      operationId: getNewsEvents
      summary: Get upcoming high-impact news events
      parameters:
        - name: pair
          in: query
          schema:
            type: string
        - name: hours
          in: query
          schema:
            type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNewsEventsResponse"

  /news/status:
    get:
      operationId: getNewsStatus
      summary: Get news blocking status for all tracked pairs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNewsStatusResponse"

  /news/calendar:
    get:
      operationId: getNewsCalendar
      summary: Get full week economic calendar grouped by day
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNewsCalendarResponse"

  # ── Risk Settings ──────────────────────────────────────────────────────────
  /risk/settings:
    get:
      operationId: getRiskSettings
      summary: Get risk management settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSettings"
    put:
      operationId: updateRiskSettings
      summary: Update risk management settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskSettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSettings"

components:
  schemas:

    # ── Trade Memory ──────────────────────────────────────────────────────────
    MemorySummary:
      type: object
      required: [totalRecorded, closedTrades, winRate, totalClusters, avgConfAdjustment, missedOpportunities, missedWouldWin, missedWouldLose]
      properties:
        totalRecorded:
          type: integer
        closedTrades:
          type: integer
        winRate:
          type: number
        totalClusters:
          type: integer
        avgConfAdjustment:
          type: number
        bestClusterKey:
          type: string
          nullable: true
        missedOpportunities:
          type: integer
        missedWouldWin:
          type: integer
        missedWouldLose:
          type: integer

    TradeMemoryRecord:
      type: object
      required: [id, tradeId, pair, direction, session, zoneScore, liquidityScore, amdScore, confirmationScore, finalScore, confidence, riskRewardPlanned, outcome, openedAt]
      properties:
        id:
          type: integer
        tradeId:
          type: integer
        pair:
          type: string
        direction:
          type: string
        session:
          type: string
        regime:
          type: string
          nullable: true
        regimeConfidence:
          type: string
          nullable: true
        zoneScore:
          type: string
        liquidityScore:
          type: string
        amdScore:
          type: string
        confirmationScore:
          type: string
        finalScore:
          type: string
        confidence:
          type: string
        zoneType:
          type: string
          nullable: true
        amdPattern:
          type: string
          nullable: true
        riskRewardPlanned:
          type: string
        riskRewardActual:
          type: string
          nullable: true
        outcome:
          type: string
          nullable: true
        pnl:
          type: string
          nullable: true
        pnlPercent:
          type: string
          nullable: true
        closeReason:
          type: string
          nullable: true
        timeInTradeMins:
          type: integer
          nullable: true
        clusterKey:
          type: string
          nullable: true
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true

    MissedOpportunity:
      type: object
      required: [id, pair, direction, session, zoneScore, liquidityScore, amdScore, confirmationScore, finalScore, confidence, rejectionReason, createdAt]
      properties:
        id:
          type: integer
        pair:
          type: string
        direction:
          type: string
        session:
          type: string
        regime:
          type: string
          nullable: true
        zoneScore:
          type: string
        liquidityScore:
          type: string
        amdScore:
          type: string
        confirmationScore:
          type: string
        finalScore:
          type: string
        confidence:
          type: string
        zoneType:
          type: string
          nullable: true
        amdPattern:
          type: string
          nullable: true
        riskReward:
          type: string
          nullable: true
        entryPrice:
          type: string
          nullable: true
        rejectionReason:
          type: string
        priceAt1h:
          type: string
          nullable: true
        priceAt4h:
          type: string
          nullable: true
        priceAt24h:
          type: string
          nullable: true
        estimatedPipsIfTaken:
          type: string
          nullable: true
        outcomeIfTaken:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ConfidenceProfile:
      type: object
      required: [id, clusterKey, zoneScoreBucket, liquidityScoreBucket, amdScoreBucket, confirmationScoreBucket, session, totalTrades, wins, losses, winRate, profitFactor, avgRr, confidenceAdjustment]
      properties:
        id:
          type: integer
        clusterKey:
          type: string
        zoneScoreBucket:
          type: string
        liquidityScoreBucket:
          type: string
        amdScoreBucket:
          type: string
        confirmationScoreBucket:
          type: string
        session:
          type: string
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        totalPnl:
          type: string
        winRate:
          type: string
        profitFactor:
          type: string
        avgRr:
          type: string
        avgPnl:
          type: string
        avgFinalScore:
          type: string
        confidenceAdjustment:
          type: string
        last10WinRate:
          type: string
          nullable: true
        last10Pnl:
          type: string
          nullable: true
        rank:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time

    TopSetups:
      type: object
      required: [top, worst]
      properties:
        top:
          type: array
          items:
            $ref: "#/components/schemas/ConfidenceProfile"
        worst:
          type: array
          items:
            $ref: "#/components/schemas/ConfidenceProfile"

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Bot ──────────────────────────────────────────────────────────────────
    BotStatus:
      type: object
      required: [running, mode, activePairs, openTrades, dailyPnl, dailyLoss, weeklyLoss, lastUpdated]
      properties:
        running:
          type: boolean
        mode:
          type: string
          enum: [live, paper, backtest]
        activePairs:
          type: array
          items:
            type: string
        openTrades:
          type: integer
        dailyPnl:
          type: number
        dailyLoss:
          type: number
        weeklyLoss:
          type: number
        haltedDueToRisk:
          type: boolean
        emergencyStop:
          type: boolean
        liveEnabled:
          type: boolean
        lastUpdated:
          type: string

    EmergencyStopResponse:
      type: object
      required: [stopped, tradesClosed, timestamp]
      properties:
        stopped:
          type: boolean
        tradesClosed:
          type: integer
        timestamp:
          type: string

    LiveModeInput:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    LiveModeResponse:
      type: object
      required: [liveEnabled, updatedAt]
      properties:
        liveEnabled:
          type: boolean
        updatedAt:
          type: string

    ExecutionLogEntry:
      type: object
