                  generatedAt:
                    type: string

components:
  schemas:

    # ── Trade Memory ──────────────────────────────────────────────────────────
    MemorySummary:
      type: object
      required: [totalRecorded, closedTrades, winRate, totalClusters, avgConfAdjustment, missedOpportunities, missedWouldWin, missedWouldLose]
      properties:
        totalRecorded:
          type: integer
        closedTrades:
          type: integer
        winRate:
          type: number
        totalClusters:
          type: integer
        avgConfAdjustment:
          type: number
        bestClusterKey:
          type: string
          nullable: true
        missedOpportunities:
          type: integer
        missedWouldWin:
          type: integer
        missedWouldLose:
          type: integer

    TradeMemoryRecord:
      type: object
      required: [id, tradeId, pair, direction, session, zoneScore, liquidityScore, amdScore, confirmationScore, finalScore, confidence, riskRewardPlanned, outcome, openedAt]
      properties:
        id:
          type: integer
        tradeId:
          type: integer
        pair:
          type: string
        direction:
          type: string
        session:
          type: string
        regime:
          type: string
          nullable: true
        regimeConfidence:
          type: string
          nullable: true
        zoneScore:
          type: string
        liquidityScore:
          type: string
        amdScore:
          type: string
        confirmationScore:
          type: string
        finalScore:
          type: string
        confidence:
          type: string
        zoneType:
          type: string
          nullable: true
        amdPattern:
          type: string
          nullable: true
        riskRewardPlanned:
          type: string
        riskRewardActual:
          type: string
          nullable: true
        outcome:
          type: string
          nullable: true
        pnl:
          type: string
          nullable: true
        pnlPercent:
          type: string
          nullable: true
        closeReason:
          type: string
          nullable: true
        timeInTradeMins:
          type: integer
          nullable: true
        clusterKey:
          type: string
          nullable: true
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true

    MissedOpportunity:
      type: object
      required: [id, pair, direction, session, zoneScore, liquidityScore, amdScore, confirmationScore, finalScore, confidence, rejectionReason, createdAt]
      properties:
        id:
          type: integer
        pair:
          type: string
        direction:
          type: string
        session:
          type: string
        regime:
          type: string
          nullable: true
        zoneScore:
          type: string
        liquidityScore:
          type: string
        amdScore:
          type: string
        confirmationScore:
          type: string
        finalScore:
          type: string
        confidence:
          type: string
        zoneType:
          type: string
          nullable: true
        amdPattern:
          type: string
          nullable: true
        riskReward:
          type: string
          nullable: true
        entryPrice:
          type: string
          nullable: true
        rejectionReason:
          type: string
        priceAt1h:
          type: string
          nullable: true
        priceAt4h:
          type: string
          nullable: true
        priceAt24h:
          type: string
          nullable: true
        estimatedPipsIfTaken:
          type: string
          nullable: true
        outcomeIfTaken:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ConfidenceProfile:
      type: object
      required: [id, clusterKey, zoneScoreBucket, liquidityScoreBucket, amdScoreBucket, confirmationScoreBucket, session, totalTrades, wins, losses, winRate, profitFactor, avgRr, confidenceAdjustment]
      properties:
        id:
          type: integer
        clusterKey:
          type: string
        zoneScoreBucket:
          type: string
        liquidityScoreBucket:
          type: string
        amdScoreBucket:
          type: string
        confirmationScoreBucket:
          type: string
        session:
          type: string
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        totalPnl:
          type: string
        winRate:
          type: string
        profitFactor:
          type: string
        avgRr:
          type: string
        avgPnl:
          type: string
        avgFinalScore:
          type: string
        confidenceAdjustment:
          type: string
        last10WinRate:
          type: string
          nullable: true
        last10Pnl:
          type: string
          nullable: true
        rank:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time

    TopSetups:
      type: object
      required: [top, worst]
      properties:
        top:
          type: array
          items:
            $ref: "#/components/schemas/ConfidenceProfile"
        worst:
          type: array
          items:
            $ref: "#/components/schemas/ConfidenceProfile"

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Bot ──────────────────────────────────────────────────────────────────
    BotStatus:
      type: object
      required: [running, mode, activePairs, openTrades, dailyPnl, dailyLoss, weeklyLoss, lastUpdated]
      properties:
        running:
          type: boolean
        mode:
          type: string
          enum: [live, paper, backtest]
        activePairs:
          type: array
          items:
            type: string
        openTrades:
          type: integer
        dailyPnl:
          type: number
        dailyLoss:
          type: number
        weeklyLoss:
          type: number
        haltedDueToRisk:
          type: boolean
        emergencyStop:
          type: boolean
        liveEnabled:
          type: boolean
        lastUpdated:
          type: string

    EmergencyStopResponse:
      type: object
      required: [stopped, tradesClosed, timestamp]
      properties:
        stopped:
          type: boolean
        tradesClosed:
          type: integer
        timestamp:
          type: string

    LiveModeInput:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    LiveModeResponse:
      type: object
      required: [liveEnabled, updatedAt]
      properties:
        liveEnabled:
          type: boolean
        updatedAt:
          type: string

    ExecutionLogEntry:
      type: object
      required: [id, eventType, reason, mode, createdAt]
      properties:
        id:
          type: integer
        eventType:
          type: string
          enum: [trade_opened, trade_closed, emergency_stop, daily_halt, weekly_halt, manual_close, live_enabled, live_disabled, resume, bot_started, bot_stopped]
        tradeId:
          type: ["integer", "null"]
        pair:
          type: ["string", "null"]
        direction:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        slippagePips:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        reason:
          type: string
        mode:
          type: string
          enum: [paper, live]
        createdAt:
          type: string

    ExecutionLogResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionLogEntry"
        total:
          type: integer

    BotStartInput:
      type: object
      required: [mode, pairs]
      properties:
        mode:
          type: string
          enum: [live, paper]
        pairs:
          type: array
          items:
            type: string
        brokerId:
          type: ["integer", "null"]

    BotConfig:
      type: object
      required: [id, pairs, sessions, riskPerTrade, maxDailyLoss, maxWeeklyLoss, newsFilterEnabled, trailingStopEnabled, confirmationRequired, createdAt, updatedAt]
      properties:
        id:
          type: integer
        pairs:
          type: array
          items:
            type: string
        sessions:
          type: array
          items:
            type: string
        riskPerTrade:
          type: number
        maxDailyLoss:
          type: number
        maxWeeklyLoss:
          type: number
        newsFilterEnabled:
          type: boolean
        trailingStopEnabled:
          type: boolean
        confirmationRequired:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    BotConfigInput:
      type: object
      properties:
        pairs:
          type: array
          items:
            type: string
        sessions:
          type: array
          items:
            type: string
        riskPerTrade:
